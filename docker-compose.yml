version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - sqlite-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/courses.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite-data:
